<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página no encontrada — León Telecom</title>
  <link rel="icon" type="image/png" href="images/favicon.png?v=1">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
      background:linear-gradient(150deg,#2c0a6b,#4a1aa0 55%,#7c3aed);color:#fff;text-align:center;position:relative;overflow:hidden}
    body::before,body::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.07)}
    body::before{width:420px;height:420px;top:-140px;right:-120px}
    body::after{width:320px;height:320px;bottom:-120px;left:-100px}
    .box{position:relative;z-index:1;max-width:520px}
    .logo{width:84px;height:84px;border-radius:22px;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:0 12px 34px rgba(0,0,0,.28)}
    .logo img{width:62px;height:62px;object-fit:contain}
    .code{font-size:5.5em;font-weight:800;line-height:1;letter-spacing:2px;text-shadow:0 6px 24px rgba(0,0,0,.25)}
    h1{font-size:1.5em;margin:6px 0 10px}
    p{opacity:.9;font-size:1.02em;margin-bottom:26px}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;border-radius:12px;font-weight:700;text-decoration:none;transition:.15s;font-size:.98em}
    .btn-main{background:#fff;color:#4a1aa0;box-shadow:0 8px 22px rgba(0,0,0,.22)}
    .btn-main:hover{transform:translateY(-2px)}
    .btn-wa{background:#25d366;color:#fff}
    .btn-wa:hover{transform:translateY(-2px)}
    @media(max-width:480px){.code{font-size:4em}h1{font-size:1.25em}}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo"><img src="images/logo.png" alt="León Telecom" onerror="this.style.display='none';this.parentElement.textContent='LT';this.parentElement.style.color='#4a1aa0';this.parentElement.style.fontWeight='800';this.parentElement.style.fontSize='1.8em'"></div>
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o se movió. Pero aquí seguimos para conectarte. 📶</p>
    <div class="btns">
      <a class="btn btn-main" href="/">🏠 Ir al inicio</a>
      <a class="btn btn-wa" href="https://wa.me/529511697346?text=Hola%2C%20necesito%20informaci%C3%B3n%20de%20Le%C3%B3n%20Telecom" target="_blank" rel="noopener noreferrer">💬 Escríbenos por WhatsApp</a>
    </div>
  </div>
</body>
</html>
