<svg xmlns="http://www.w3.org/2000/svg" viewBox="26 36 158 104" role="img" aria-label="León Telecom">
  <defs>
    <linearGradient id="maneWhite" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#dbe8ff"/>
    </linearGradient>
    <linearGradient id="accentCy" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#5cf0f5"/>
      <stop offset="100%" stop-color="#12b6c6"/>
    </linearGradient>
  </defs>

  <!-- Emblema (melena + escudo + cara) -->
  <g transform="translate(34,34)">
    <!-- Melena principal: BLANCA -->
    <path d="M108 23
             C92 11, 70 11, 54 24
             C41 34, 31 44, 20 49
             C34 52, 45 59, 54 68
             C63 76, 69 85, 76 96
             C83 87, 89 78, 100 71
             C113 62, 127 58, 142 58
             C131 49, 124 38, 108 23 Z"
          fill="url(#maneWhite)"/>

    <!-- Acentos de la cola/flama: CYAN -->
    <path d="M25 52
             C8 45, 4 28, 16 18
             C27 9, 44 10, 56 18
             C42 18, 31 26, 25 36
             C21 43, 21 48, 25 52 Z"
          fill="url(#accentCy)"/>
    <path d="M10 49
             C2 44, 0 32, 7 24
             C14 16, 26 16, 35 21
             C25 21, 17 27, 13 35
             C11 40, 10 45, 10 49 Z"
          fill="#ffffff" opacity="0.96"/>

    <!-- Escudo interior: BLANCO -->
    <circle cx="92" cy="58" r="39" fill="#ffffff"/>
    <circle cx="92" cy="58" r="33" fill="#f4f9ff"/>

    <!-- Cara del león: NAVY (visible sobre el escudo blanco) -->
    <path d="M77 39
             C81 34, 86 31, 92 31
             C98 31, 103 34, 107 39
             C110 45, 111 52, 110 57
             C108 63, 104 68, 98 71
             C97 65, 95 62, 92 61
             C89 62, 87 65, 86 71
             C80 68, 76 63, 74 57
             C73 52, 74 45, 77 39 Z"
          fill="#1e376f"/>
    <path d="M82 49 C84 46, 87 45, 89 47" stroke="#1e376f" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M102 49 C100 46, 97 45, 95 47" stroke="#1e376f" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <circle cx="84.5" cy="49.5" r="2.4" fill="#1e376f"/>
    <circle cx="99.5" cy="49.5" r="2.4" fill="#1e376f"/>
    <path d="M92 53 L88 59 L92 62 L96 59 Z" fill="#1e376f"/>
    <path d="M86 62 C88 66, 96 66, 98 62" stroke="#1e376f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
